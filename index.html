<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9. 시스템과 역기획</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn svg { display: block; }
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn svg { display: block; }
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 26px;
    display: flex;
    gap: 1px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    height: 100%;
    min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 2px;
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) — gap 요소 제외 */
.map-segment:nth-of-type(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-of-type(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
    #audio-map { margin-top: 12px; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-map { margin-top: 16px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}
/* ========== 모바일 목차 FAB + 오버레이 ========== */
#index-fab {
    display: none;
    position: fixed;
    bottom: 76px; right: 20px;
    z-index: 1100;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border-dim);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: var(--transition);
    align-items: center; justify-content: center;
}
#index-fab:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
}
@media (max-width: 900px) {
    #index-fab { display: flex; }
}

#index-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 1200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}
#index-overlay.open { display: flex; justify-content: flex-end; }

#index-overlay-panel {
    width: min(320px, 85vw);
    height: 100%;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
    animation: slideInRight 0.25s ease-out;
}
@keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
#index-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
}
#index-overlay-header span {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#index-overlay-close {
    background: transparent; border: none;
    color: var(--text-muted); font-size: 22px;
    cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
    transition: var(--transition);
}
#index-overlay-close:hover {
    background: var(--bg-elevated); color: var(--text-primary);
}
#index-overlay-list .index-item {
    padding: 12px 16px;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="수학으로_설계된_게임_재미의_함정.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="2.5" height="12" rx="1" fill="currentColor"/><path d="M13 1.5L5 7L13 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button id="play-btn" onclick="togglePlay()"><svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button class="skip-btn" onclick="skipTime(10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1.5L9 7L1 12.5V1.5Z" fill="currentColor"/><rect x="10.5" y="1" width="2.5" height="12" rx="1" fill="currentColor"/></svg></button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>

  {
    "id": "P12",
    "title": "시스템 구현 / UI",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">해당 시스템이 어떤 UI를 통해 정보를 입/출력 하는가?</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-text\">시스템의 내부 처리 결과는 <strong>UI를 통해 플레이어에게 전달</strong>된다. 동시에 <strong>플레이어의 선택도 UI를 통해 시스템에 입력</strong>된다.</div>",
    "hasAudio": true,
    "start": 530.0,
    "end": 580.0
  },
  {
    "id": "P13",
    "title": "시스템 설계",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">입력된 데이터를 어떻게 처리하여 출력할지를 설계하는 것</div></div>\n<ul class=\"slide-points\"><li>규칙과 구조를 만든 후 입력 받을 UI를 입혀 마무리</li><li>입력에 꼭 UI가 필요하지는 않음 (키보드, 컨트롤러 등)</li></ul>\n<div class=\"slide-text\">이러한 과정 여러 개가 멈추지 않고 계속 돌아가며 플레이어에게 새로운 상황을 던져주는 것이 <strong>게임 시스템의 본질</strong>이다. 유지보수를 위해 반드시 <strong>테이블 구조</strong>를 만들라.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">플레이어는 공격 버튼만 누르지만, 시스템 내부에서는 <strong>데미지 계산→방어력 차감→크리티컬 판정→HP UI 업데이트→사망 여부 체크</strong>가 1프레임 안에 자동으로 일어난다.</div></div>",
    "hasAudio": true,
    "start": 555.0,
    "end": 610.0
  },
  {
    "id": "P14",
    "title": "효과 검증",
    "content": "<div class=\"slide-text\">시스템 설계 후에는 반드시 검증이 필요하다. 상황과 자원에 맞는 방법을 선택하라.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">플레이 가능 버전</div><div class=\"card-desc\">가장 확실한 검증. 실제로 플레이하며 문제를 발견</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">프로토타이핑</div><div class=\"card-desc\">핵심 메커닉만 빠르게 구현하여 테스트</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시뮬레이션 문서</div><div class=\"card-desc\">수치 기반으로 문서상에서 결과를 예측</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">타 게임 사례 분석</div><div class=\"card-desc\">자원 최소화, 기존 게임을 참고하여 방향 설정</div></div>",
    "hasAudio": true,
    "start": 578.0,
    "end": 625.0
  },
  {
    "id": "P15",
    "title": "역기획",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">역기획이란?</div><div class=\"card-desc\">기존에 출시된 게임의 전체 혹은 일부를 다시 <strong>개발 가능한 형태의 기획서로 정리</strong>하는 것</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">왜 중요한가?</div><div class=\"card-desc\">일반 업체에서 기획자의 포트폴리오로 <strong>가장 선호하는 형태의 문서 중 하나</strong>이다. 기존 게임을 분석하는 과정에서 시스템 설계 능력이 자연스럽게 향상된다.</div></div>",
    "hasAudio": true,
    "start": 625.0,
    "end": 660.0
  },
  {
    "id": "P16",
    "title": "시스템 디자인 프레임워크",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">MDA 프레임워크</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">구조(Mechanics)</div><div class=\"card-desc\">시스템으로서의 게임을 설명하는 공식적인 규칙들과 개념들</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">역학(Dynamics)</div><div class=\"card-desc\">게임을 플레이하는 과정에서 나타내는 플레이어들의 행동</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">미학(Aesthetics)</div><div class=\"card-desc\">디자이너가 역학을 통해 의도한 플레이어의 감성적 반응 - 즉, <strong>재미!</strong></div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">) 팩맨</div></div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-card\"><div class=\"card-heading\">구조</div><div class=\"card-desc\">빨간 유령은 팩맨의 형재 위치로, 핑크 유령은 팩맨이 바라보는 타일 위치로 이동 → 시스템</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">역학</div><div class=\"card-desc\">유저는 구석으로 도망갈 수 밖에 없음</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">미학</div><div class=\"card-desc\">빨간 유령과 핑크 유령이 자신을 둘러쌈을 경험. 게임의 <strong>긴장감</strong>을 느끼게 됨</div></div>",
    "hasAudio": true,
    "start": 660.0,
    "end": 715.0
  },
  {
    "id": "P17",
    "title": "MDA 프레임워크의 효과",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">1. 관점의 차이</div><div class=\"card-desc\">게임 디자이너는 <strong>M→D→A</strong>의 시각으로, 플레이어는 <strong>A→D→M</strong>의 시각으로 게임을 바라본다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">2. MDA 프레임워크에 의한 분석</div><div class=\"card-desc\">MDA 프레임워크에 의한 분석은 게임 디자이너들이 사용자 체험중심의 설계를 할 수 있도록 도와준다.</div></div>\n<div class=\"slide-text\"></div>",
    "hasAudio": true,
    "start": 700.0,
    "end": 730.0
  },
  {
    "id": "P18",
    "title": "MDA 프레임워크 / 미학",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">게임이 플레이어에게 전달하는 8가지 감성적 경험</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">감각(Sensation)</div><div class=\"card-desc\">: 즐거움으로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">환상(Fantasy)</div><div class=\"card-desc\">: 공상으로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">서사(Narrative)</div><div class=\"card-desc\">: 이야기로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">도전(Challenge)</div><div class=\"card-desc\">: 장애물 경주로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">사교(Fellowship)</div><div class=\"card-desc\">: 사회적 틀로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">발견(Discovery)</div><div class=\"card-desc\">: 미개척지로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">표현(Expression)</div><div class=\"card-desc\">: 자기 발견으로서의 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">굴레(Submission)</div><div class=\"card-desc\">: 오락으로서의 게임</div></div>",
    "hasAudio": true,
    "start": 715.0,
    "end": 780.0
  },
  {
    "id": "P19",
    "title": "MDA 프레임워크 / 역학",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">역학 = 미학적 경험을 전달해 주는 단계</div></div>\n<div class=\"slide-text\">미학적 목표를 달성하기 위해 실제로 플레이어가 경험하게 되는 게임 내 상호작용이다.</div>\n<div class=\"slide-def-card\"><div class=\"def-title\">도전의 역학</div><div class=\"def-desc\">제한된 시간, 적의 거센 공격</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">연대감의 역학</div><div class=\"def-desc\">정보의 공유, 혼자 달성하기, 어려운 목표 설정</div></div>",
    "hasAudio": true,
    "start": 760.0,
    "end": 795.0
  },
  {
    "id": "P20",
    "title": "역학 모델 / 확률",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">확률을 통해 유저의 행동을 제어</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">아이템 강화 확률</div><div class=\"def-desc\">3강부터 파괴 가능 → 상위 유저 수 제한, 유료 아이템 결제 유도</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">가챠 확률</div><div class=\"def-desc\">S급 아이템 1%확률 → 플레이 타임 및 컨텐츠 소모 속도 조절</div></div>",
    "hasAudio": true,
    "start": 780.0,
    "end": 830.0
  },
  {
    "id": "P21",
    "title": "역학 모델 / 게임 내 자원",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">게임 내 자원(Token)의 관리를 통해 유저의 행동을 제어/예측</div></div>\n<div class=\"slide-text\">대표적인 자원으로는  <strong>돈, 시간, 경험치</strong> 등이 있다.</div>\n<div class=\"slide-def-card\"><div class=\"def-title\">애니팡 하트 시스템</div><div class=\"def-desc\">5분마다 1개 재생 → 회당 플레이타임 제한(권태감 감소), 재접속 횟수 증가(수명 연장)</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">재생 불가능한 자원</div><div class=\"def-desc\">제한 시간, 전략 게임의 자원밭* 등으로 유저의 행동을 근본적으로 조절</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">*자원밭</div><div class=\"card-desc\">: 한번 캐면 재활성까지 대기</div></div>",
    "hasAudio": true,
    "start": 810.0,
    "end": 870.0
  },
  {
    "id": "P22",
    "title": "자원의 다양한 형태",
    "content": "<div class=\"slide-text\">자원의 목적, 획득/소비 조건, 변동 방식과 빈도 등에 따라 다양한 형태로 게임 구성에 영향을 미친다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">유지/증가형</div><div class=\"card-desc\">경험치 등 - 축적되며 줄어들지 않는 자원</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">유지/감소형</div><div class=\"card-desc\">제한 시간 등 - 사용하면 줄어드는 자원</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">목적 소비형</div><div class=\"card-desc\">돈, 재료 등 - 유저가 목적을 가지고 의도적으로 소비하는 자원</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P23",
    "title": "역학 모델 / 피드백 시스템",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">피드백 시스템은 자신의 상태를 확인하고 조절한다</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">부정적 피드백(Negative)</div><div class=\"card-desc\">시스템을 <strong>안정화</strong>. 약팀에게 역전 기회를 제공하고 의욕을 부여한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">긍정적 피드백(Positive)</div><div class=\"card-desc\">시스템을 <strong>불안정하게</strong>. 강팀에게 메리트를 부여하여 무의미한 시간 낭비를 방지한다.</div></div>",
    "hasAudio": true,
    "start": 862.0,
    "end": 920.0
  },
  {
    "id": "P24",
    "title": "피드백의 예시 (Feat. 롤)",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">부정적 피드백 예시</div><div class=\"card-desc\">라인전에서 미니언을 많이 처치할수록 라인이 밀려 캐릭터가 점점 더 위험에 처함</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">긍정적 피드백 예시</div><div class=\"card-desc\">타워를 빨리 철거할수록 상대 정글과 다른 라인을 더 강력히 압박 가능</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">KOEI 삼국지 시리즈는 후반 긍정적 피드백 설계가 약해 일정 순간 이후 게임이 급격히 루즈해지는 사례이다.</div></div>",
    "hasAudio": true,
    "start": 880.0,
    "end": 920.0
  }
];
const TRANSCRIPT = [{"start": 0.0, "end": 5.6000000000000005, "text": "화면 속에서 막 화려한 검기가 번쩍이고 거대한 드래곤이 쓰러집니다."}, {"start": 5.6000000000000005, "end": 12.06, "text": "내가 조이패드를 움직이는 바로 그 순간 화면 안의 세계가 나의 의도에 완벽하게 반응하죠."}, {"start": 12.06, "end": 14.16, "text": "네, 아주 즉각적으로 반응하죠."}, {"start": 14.16, "end": 15.08, "text": "맞아요."}, {"start": 15.08, "end": 21.82, "text": "우리는 흔히 이 압도적인 몰입감을 재미 라고 부르면서 막 밤을 세월하며 컨트롤러를 붙잡고 있거든요."}, {"start": 21.82, "end": 22.32, "text": "그렇죠."}, {"start": 22.32, "end": 24.78, "text": "다들 그런 경험 한 번씩 있으실 겁니다."}, {"start": 24.78, "end": 28.16, "text": "근데 청취자 여러분, 혹시 이런 생각해 보신 적 없으신가요?"}, {"start": 28.16, "end": 29.36, "text": "도대체 왜?"}, {"start": 29.36, "end": 32.82, "text": "우리는 이 네모난 화면 속 세상에서 헤어나오지 못하는 걸까요?"}, {"start": 32.82, "end": 35.24, "text": "사실 그게 다 이유가 있죠."}, {"start": 35.24, "end": 40.44, "text": "네, 그래서 오늘 우리는 그 마법의 장막을 한꺼풀 들쳐보려고 합니다."}, {"start": 40.44, "end": 47.18, "text": "그곳에 마법지팡이 대신에 차갑고 정교하게 맞물려 돌아가는 거대한 수학적 톱니바퀴들이 자리 잡고 있거든요."}, {"start": 47.18, "end": 48.120000000000005, "text": "맞습니다."}, {"start": 48.120000000000005, "end": 54.7, "text": "우리가 무심코 느끼는 그 재미와 성취감이라는 감정조차도 사실은 절대 우연이 아니에요."}, {"start": 54.7, "end": 61.18000000000001, "text": "모두 누군가에 의해 치밀하게 계산되고 아주 의도적으로 설계된 함정이자 결과물인 거죠."}, {"start": 61.18000000000001, "end": 63.7, "text": "와, 함정이라고 하시니까 좀 무서운데요?"}, {"start": 63.7, "end": 68.04, "text": "그래서 오늘의 딥다이브는 바로 그 완벽한 함정을 파놓은 조물주들,"}, {"start": 68.04, "end": 71.26, "text": "게임 기획자들의 머릿속으로 직접 들어가 보려고 합니다."}, {"start": 71.26, "end": 72.58, "text": "네, 기대되네요."}, {"start": 72.58, "end": 78.82000000000001, "text": "지금 듣고 계신 청취자님, 오늘 우리가 파헤칠 자료는 현업에서 10년 동안 구른 베테랑 기획자의"}, {"start": 78.82000000000001, "end": 82.46000000000001, "text": "게임 기획 입문 강의라는 아주 귀중한 설계도면입니다."}, {"start": 82.46, "end": 84.69999999999999, "text": "현업의 노하우가 꽉 찬 저료죠?"}, {"start": 84.69999999999999, "end": 88.97999999999999, "text": "저는 게임이라면 정말 수천 시간을 쏟아부은 열정적인 게이머지만"}, {"start": 88.97999999999999, "end": 92.91999999999999, "text": "막상 이걸 어떻게 조립하는지 기획 1호는 처음 접하는 입장이거든요."}, {"start": 92.91999999999999, "end": 95.22, "text": "그래서 오늘 아주 낱낱이 질문을 던져보겠습니다."}, {"start": 95.22, "end": 97.13999999999999, "text": "좋습니다. 다 받아치겠습니다."}, {"start": 97.13999999999999, "end": 100.3, "text": "우리가 매일 무심코 즐기는 그 놀이 뒤에"}, {"start": 100.3, "end": 105.3, "text": "얼마나 무시무시한 통제 구조가 숨어 있는지 알아내는 게 오늘의 미션입니다."}, {"start": 105.3, "end": 111.82, "text": "자, 복잡한 기획서들이 어떻게 현실의 플레이로 살아 숨쉬게 되는지 바로 들어가 볼까요?"}, {"start": 111.82, "end": 119.13999999999999, "text": "네. 그럼 이 거대한 가상세계를 지탱하는 가장 근본적인 뼈대 시스템부터 시작하죠."}, {"start": 119.13999999999999, "end": 126.38, "text": "시스템이란 규칙과 구조로 이루어진 입력, 처리, 출력에 자동화된 프로세스를 뜻합니다."}, {"start": 126.38, "end": 129.5, "text": "어, 입력, 처리, 출력에 자동화요."}, {"start": 129.5, "end": 131.42, "text": "그게 정확히 무슨 말이에요?"}, {"start": 131.42, "end": 136.98, "text": "게이머인 제 입장에선 보스 몬스터 잡으려고 키보드를 미친 듯이 연타하는 게 전부인데"}, {"start": 136.98, "end": 141.38, "text": "제가 조작하는 동안 정확히 어떤 것들이 자동으로 돌아가고 있다는 건가요?"}, {"start": 141.38, "end": 149.01999999999998, "text": "아, 여기서 말하는 자동화는 유저의 별도 입력 없이도 데이터가 스스로 알아서 처리되는 구조를 말해요."}, {"start": 149.01999999999998, "end": 150.34, "text": "알아서 처리된다고요?"}, {"start": 150.34, "end": 156.1, "text": "네. 가장 직관적인 사례로 RPG 게임의 자동 물력 기능이 있거든요."}, {"start": 156.1, "end": 161.98, "text": "유저의 체력이 30% 이하로 떨어지면 유저가 인벤토리를 열어 클릭하지 않아도"}, {"start": 161.98, "end": 166.3, "text": "시스템이 알아서 포션 개수를 차감하고 체력 데이터를 회복시킵니다."}, {"start": 166.3, "end": 168.14, "text": "오, 자동으로 막 먹여주는 그거요?"}, {"start": 168.17999999999998, "end": 172.38, "text": "맞아요. 유저는 그저 전투의 재미에만 집중하면 되는 거죠."}, {"start": 172.38, "end": 178.14, "text": "아, 제가 귀찮은 계산을 신경 쓰지 않도록 뒤에서 치워주는 투명한 청소부 같은 거군요."}, {"start": 178.14, "end": 181.73999999999998, "text": "그럼 이런 자동화 시스템들이 막 맞물려 돌아가면서"}, {"start": 181.73999999999998, "end": 185.01999999999998, "text": "게임 전체를 굴러가게 만드는 가장 핵심적인 엔진은 뭔가요?"}, {"start": 185.01999999999998, "end": 189.17999999999998, "text": "그 엔진 역할을 하는 것이 바로 핵심 루프입니다."}, {"start": 189.17999999999998, "end": 196.26, "text": "핵심 루프란 모든 게임에서 플레이어가 필연적으로 반복하게 되는 최소 단위의 순환 구조를 말하거든요."}, {"start": 196.26, "end": 198.7, "text": "필연적으로 반복하는 순환 구조요?"}, {"start": 198.7, "end": 201.45999999999998, "text": "정확히 어떤 행동을 반복한다는 뜻이죠?"}, {"start": 201.45999999999998, "end": 204.7, "text": "사실 똑같은 행동 계속하면 현실에선 지루하잖아요."}, {"start": 204.7, "end": 207.82, "text": "어, 몬스터 사냥을 예로 들어볼게요."}, {"start": 207.82, "end": 213.7, "text": "유저가 적을 처치하는 행동을 하면 골드나 경험치라는 확실한 보상을 얻습니다."}, {"start": 213.7, "end": 215.22, "text": "네네, 돈 떨어지죠."}, {"start": 215.22, "end": 220.1, "text": "그렇죠. 이 보상으로 더 좋은 장비를 맞춰 성장을 이뤄내고"}, {"start": 220.1, "end": 225.1, "text": "그렇게 강해진 캐릭터로 더 강력한 보스에게 새롭게 도전하게 됩니다."}, {"start": 225.1, "end": 228.66, "text": "아, 행동, 보상, 성장, 도전."}, {"start": 228.66, "end": 234.62, "text": "맞습니다. 이 과정이 유저 스스로 챗바퀴를 굴리게 만드는 강력한 동기가 되는 거죠."}, {"start": 234.62, "end": 239.74, "text": "듣고 보니 저도 이 4박자에 빠져서 주말 통째로 날린 적이 한두 번이 아니네요."}, {"start": 239.74, "end": 246.82, "text": "근데 그럼 계속 성장하다 보면 데미지나 체력 수치가 1억, 10억 단위로 엄청나게 커질 텐데"}, {"start": 246.82, "end": 250.1, "text": "이 복잡한 수치와 밸런스는 대체 어떻게 맞추나요?"}, {"start": 250.1, "end": 255.29999999999998, "text": "거기서 기획의 꽃이라 불리는 수치와 밸런스 개념이 등장합니다."}, {"start": 255.29999999999998, "end": 262.18, "text": "게임 내 모든 요소를 숫자로 정의해서 공정하고 몰입감 있는 경험을 제공하는 핵심 과정이죠."}, {"start": 262.18, "end": 267.42, "text": "모든 걸 숫자로 정의한다고요? 구체적으로 어떤 숫자를 주율해서 몰입감을 주나요?"}, {"start": 267.42, "end": 270.5, "text": "우리가 게임할 때 엑셀 수식을 보고 재밌어하진 않잖아요?"}, {"start": 270.5, "end": 275.18, "text": "하하, 그렇죠. 대표적인 게 성장 곡선 설계입니다."}, {"start": 275.18, "end": 278.65999999999997, "text": "레벨이 오를 때 필요한 경험치 양을 조절하는 건데요."}, {"start": 278.66, "end": 280.90000000000003, "text": "아, 레벨업 할 때 그 경험치 통이요?"}, {"start": 280.90000000000003, "end": 285.42, "text": "네, 레벨 1에서 2가 될 때는 경험치가 100만 필요하지만"}, {"start": 285.42, "end": 289.90000000000003, "text": "99에서 100이 될 때는 1억이 필요하게 세팅하는 시기죠."}, {"start": 289.90000000000003, "end": 291.70000000000005, "text": "아, 갈수록 빡세지게?"}, {"start": 291.70000000000005, "end": 297.98, "text": "맞습니다. 유저가 너무 빨리 강해져서 지루해지거나 너무 안 올라서 포기하지 않도록"}, {"start": 297.98, "end": 300.22, "text": "리스크와 리턴을 맞추는 원리입니다."}, {"start": 300.22, "end": 306.66, "text": "기가 막히네요. 근데 기획자가 밸런스를 아무리 잘 맞춰도 유저가 모르면 그만일 텐데"}, {"start": 306.66, "end": 310.78000000000003, "text": "이 복잡한 시스템이 잘 돌아가고 있다는 건 유저한테 어떻게 보여주나요?"}, {"start": 310.78000000000003, "end": 313.86, "text": "그래서 피드백과 가시성이 필수적입니다."}, {"start": 313.86, "end": 318.70000000000005, "text": "시스템의 복잡한 작용과 결과를 플레이어가 직관적으로 체감할 수 있게"}, {"start": 318.70000000000005, "end": 321.62, "text": "끊임없이 보고하는 과정이라 정의할 수 있죠."}, {"start": 321.62, "end": 326.70000000000005, "text": "끊임없이 보고를 한다고요? 게임 중에 수치 계산식을 화면에 막 퍼법창으로 띄워준다는 건가요?"}, {"start": 326.70000000000005, "end": 332.22, "text": "에이, 그러면 아무도 안 하죠. 유저가 몬스터를 때렸을 때를 떠올려 보세요."}, {"start": 332.22, "end": 336.98, "text": "화면이 미세하게 흔들리거나 묵직한 타격 사운드가 팡 터져 나오잖아요."}, {"start": 336.98, "end": 338.34000000000003, "text": "아, 찰진 소리 나죠."}, {"start": 338.34000000000003, "end": 348.5, "text": "네. 복잡한 난순회사는 뒤에서 순식간에 끝내고 유저에겐 이 즉각적이고 직관적인 타격감으로 훌륭하게 반응을 제공하는 겁니다."}, {"start": 348.5, "end": 354.06, "text": "와, 우리가 열광하는 그 타격감도 결국 시스템의 업무 보고였군요."}, {"start": 354.06, "end": 359.62, "text": "그럼 이런 멋진 시스템을 기획자들은 처음 디자인할 때 어떤 방식으로 접든해서 만들어내나요?"}, {"start": 359.62, "end": 362.66, "text": "이때면 시스템 디자인 방식을 고려합니다."}, {"start": 362.66, "end": 371.58, "text": "의도, 구현방식, 실제 효과라는 세 키워드를 바탕으로 자원소모와 검증 사이에서 최적의 방법을 선택하는 과정이거든요."}, {"start": 371.58, "end": 377.18, "text": "자원소모와 검증의 확실성이요? 상황에 따라 구체적으로 어떻게 방법이 나뉘나요?"}, {"start": 377.18, "end": 386.78000000000003, "text": "음, 만약 인건비나 시간 같은 자원을 극단적으로 아껴야 할 땐 이미 시장에 있는 기존 타게임 사례를 분석해서 안전하게 갑니다."}, {"start": 386.78000000000003, "end": 388.94, "text": "아, 남의 거 벤치마킹 하는 거군요?"}, {"start": 388.94, "end": 399.06, "text": "그렇죠. 반대로 확실한 시스템 검증이 꼭 필요할 땐 돈이 좀 들더라도 실제 플레이 가능 버전을 직접 만들어서 테스트를 해보는 방식을 택하죠."}, {"start": 399.06, "end": 401.94, "text": "목적에 따라 설계 방식이 확 달라지는군요."}, {"start": 401.94, "end": 407.14, "text": "그럼 본격적으로 디자인의 항목들을 짤 때 게임 안에 법률 같은 규칙은 어떻게 정해지나요?"}, {"start": 407.14, "end": 414.42, "text": "여러 항목 중 규칙은 게임 세계를 구성하는 최소한의 논리이자 유저와의 철저한 약속이라고 정의합니다."}, {"start": 414.42, "end": 422.3, "text": "게임 세계의 약속이요? 규칙이 시스템 자동화에서 왜 그렇게 결정적으로 중요한가요? 유저들은 늘 예상을 벗어나는 짓을 하잖아요?"}, {"start": 422.3, "end": 427.78000000000003, "text": "바로 그 이유 때문입니다. HP가 0이 되면 캐릭터는 사망한다는 규칙을 보죠."}, {"start": 427.78000000000003, "end": 437.94, "text": "유저가 맞았든, 독에 걸렸든 하루에 수만 번의 예외 상황이 발생해도 0이 되는 순간 무조건 정확하게 사망 판정이 되어야 게임이 무너지지 않습니다."}, {"start": 437.94, "end": 442.14, "text": "아, HP 0은 죽음이다? 이건 절대 타협 불가군요."}, {"start": 442.14, "end": 449.1, "text": "그럼 그 엄격한 규칙들이 여러 개 뭉치면 시스템 내에서 어떤 뼈대, 즉 구조를 이루게 되나요?"}, {"start": 449.1, "end": 459.42, "text": "구조란 방금 말씀드린 각종 규칙들이 서로 얽혀서 어떤 관계를 맺고 데이터가 흐르는지 설계한 네트워크라고 정의할 수 있어요."}, {"start": 459.42, "end": 466.82, "text": "서로 얽혀있다고요? 솔직히 저는 그냥 검을 휘두르는 건데 데이터가 구체적으로 어떻게 연결된다는 건가요?"}, {"start": 466.82, "end": 471.38, "text": "음... 유저의 공격력 수치는 절대 혼자 작동하지 않아요."}, {"start": 471.38, "end": 472.21999999999997, "text": "아, 그런가요?"}, {"start": 472.21999999999997, "end": 484.58, "text": "네. 공격력에 공격 속도가 고폐지고 적의 방어력 수치가 차감되는 식으로 제약 조건들을 명확히한 엑셀 테이블 형태로 얽혀 초당 데미지를 형성하게 되는 원리죠."}, {"start": 484.58, "end": 489.06, "text": "와, 직정에서 쓰는 엑셀 테이블이 게임의 뼈대였군요."}, {"start": 489.06, "end": 494.3, "text": "그럼 이 거대한 구조 안에서 게임이 순서대로 막힘없이 진행되는 흐름은 어떻게 통제하나요?"}, {"start": 494.3, "end": 497.46000000000004, "text": "그 흐름을 통제하는 게 바로 시퀀스입니다."}, {"start": 497.46000000000004, "end": 505.46000000000004, "text": "시퀀스란 신 전환이나 데이터 처리 등 해당 시스템이 작동하는 흐름에 대한 순서를 설계하는 것이라 정의하거든요."}, {"start": 505.46000000000004, "end": 510.58000000000004, "text": "흐름에 대한 순서요? 플레이어가 직접 체감할 수 있는 시퀀스에 구체적인 예가 있을까요?"}, {"start": 510.58000000000004, "end": 513.54, "text": "가장 뚜렷한 게 사망 처리 플로우입니다."}, {"start": 513.54, "end": 523.58, "text": "유저가 죽는 순간 화면이 흑백으로 변하고 부활석이 있는지 시스템이 체크해서 분기가 나뉘어 자동으로 처리되는 그 전체 순서들을 말하는 거죠."}, {"start": 523.58, "end": 530.9000000000001, "text": "내부에서 그런 순서가 착착 돌아가고 있다면 그 최종 결과를 유저는 어떤 창고를 통해 확인하고 입력하게 되나요?"}, {"start": 530.9000000000001, "end": 532.98, "text": "우리는 그냥 스마트폰만 쳐다보고 있잖아요."}, {"start": 532.98, "end": 536.7800000000001, "text": "거기서 UI와 시스템 설계에 완성이 이루어집니다."}, {"start": 536.7800000000001, "end": 545.58, "text": "규칙과 구조를 통해 입력 데이터를 처리할 방법을 청하고 정보 입출력을 담당할 UI를 껍데기로 입혀 최종 완성하는 단계죠."}, {"start": 545.58, "end": 549.4200000000001, "text": "아, 결국 다 UI로 예쁘게 포장된다는 건가요?"}, {"start": 549.42, "end": 555.18, "text": "그럼 제가 화면에서 공격 버튼 하나를 딱 누를 때, 뒤에서는 대체 무슨 일이 벌어지고 있죠?"}, {"start": 555.18, "end": 560.18, "text": "유저는 단순히 공격 버튼 하나를 누르지만 내부적으로는 단 1프레임,"}, {"start": 560.18, "end": 570.5799999999999, "text": "그러니까 60분의 1초 안에 데미지 계산, 방어력 차감, 크리티컬 판정, HP UI 업데이트까지 전부 자동으로 멈추지 않고 돌아갑니다."}, {"start": 570.5799999999999, "end": 578.78, "text": "세상에, 1프레임 안에 그 모든 게, 그럼 이렇게 숨 막히게 설계한 시스템이 완벽히 작동하는지는 마지막에 어떻게 확인하나요?"}, {"start": 578.78, "end": 581.74, "text": "다 만들고 나면, 통과 검증을 거쳐야죠."}, {"start": 581.74, "end": 591.4599999999999, "text": "설계 후 가장 확실하게 문제를 발견하기 위해 자원에 맞춰 직접 플레이 해보거나 핵심 모델만 떼어내어 프로토타이핑하는 단계라고 정의합니다."}, {"start": 591.4599999999999, "end": 593.78, "text": "핵심 모델만 프로토타이핑이요?"}, {"start": 593.78, "end": 600.18, "text": "그래픽 팀이 어차피 다 그릴 텐데 처음부터 완벽한 그래픽을 입힌 버저를 만들어서 테스트하지 않는 이유가 뭔가요?"}, {"start": 600.18, "end": 603.9399999999999, "text": "만약 점프해서 적을 밟는 시스템을 만든다고 쳐보죠."}, {"start": 603.94, "end": 611.5400000000001, "text": "화려한 마료 대신 그냥 회색 네모 박스가 점프하는 핵심 메커닉만 빠르게 간단한 동작 모델로 구현해 테스트해야"}, {"start": 611.5400000000001, "end": 614.1800000000001, "text": "속모 자원과 리스크를 최소화할 수 있거든요."}, {"start": 614.1800000000001, "end": 620.46, "text": "아, 회색 박스로 해보고 재미없으면 예쁜 옷 입혀도 소용없는 거니까 효율성이 생명이군요."}, {"start": 620.46, "end": 627.1800000000001, "text": "그런데 기획 지망생들이 이런 시스템 설계 감각을 기르려면 기존 게임을 활용하는 탁월한 훈련법도 있다면서요?"}, {"start": 627.1800000000001, "end": 629.34, "text": "네, 바로 역기획입니다."}, {"start": 629.34, "end": 638.0600000000001, "text": "역기획이란 기존에 출시된 게임의 전체나 일부를 개발 가능한 형태의 기획서로 거꾸로 분석해 정리하는 작업이라 정의합니다."}, {"start": 638.0600000000001, "end": 641.02, "text": "이미 대박난 게임의 기획서를 다시 쓴다고요?"}, {"start": 641.02, "end": 644.74, "text": "회사들이 신입 포트폴리오로 이걸 제일 선호하는 이유가 대체 뭔가요?"}, {"start": 644.74, "end": 654.46, "text": "완성된 훌륭한 게임을 거꾸로 뜯어서 분해해 보면서 앞서 말한 복잡한 시스템 구조 설계 능력이 자연스럽고 아주 비약적으로 향상되기 때문이죠."}, {"start": 654.46, "end": 660.1800000000001, "text": "시계 장인을 꿈꾸며 완성된 롤렉스를 싹 다 분해해 보는 거랑 똑같네요."}, {"start": 660.1800000000001, "end": 666.3000000000001, "text": "그럼 게임을 그렇게 해체하고 분석할 때 기준으로 삼는 마법의 공식 같은 틀이 있나요?"}, {"start": 666.3000000000001, "end": 670.9000000000001, "text": "강력한 분석들이 있죠. 바로 MDA 프레임워크입니다."}, {"start": 670.9000000000001, "end": 678.5, "text": "게임을 구조, 역학, 미학으로 나누어 사용자 체험 중심으로 게임을 설계하고 분석하게 돕는 프레임워크죠."}, {"start": 678.5, "end": 683.86, "text": "아, 구조, 역학, 미학. 단어들이 갑자기 너무 철학적인데."}, {"start": 683.86, "end": 687.26, "text": "이게 실제 우리가 하는 게임 화면에서는 어떻게 적용되나요?"}, {"start": 687.26, "end": 688.78, "text": "고전 게임 팩맨 아시죠?"}, {"start": 688.78, "end": 690.14, "text": "네, 동골안에요."}, {"start": 690.14, "end": 694.66, "text": "유령이 팩맨 위치로 무조건 이동한다는 프로그래밍 규칙이 구조고요."}, {"start": 694.66, "end": 699.82, "text": "그 규칙 때문에 유저를 구석으로 도망치게 만드는 행동 양식이 역학입니다."}, {"start": 699.82, "end": 705.3000000000001, "text": "그리고 결국 조여오는 아슬아슬한 긴장감. 이게 미학을 만들어내는 과정이죠."}, {"start": 705.3000000000001, "end": 711.46, "text": "아, 딱딱한 규칙 코드가 결국 플레이어에 쫀득한 감정을 빚어내는군요."}, {"start": 711.46, "end": 715.9000000000001, "text": "그렇다면 최종 목적지인 이 미학에는 어떤 종류의 감정들이 있나요?"}, {"start": 715.9000000000001, "end": 724.7800000000001, "text": "미학이란 감각, 환상, 서사, 도전, 사교, 발견, 표현, 굴레라는 8가지로 분류되는"}, {"start": 724.7800000000001, "end": 728.7800000000001, "text": "게임이 플레이어에게 전달하는 의도된 감성적 경험이라 정의합니다."}, {"start": 728.7800000000001, "end": 734.7, "text": "무려 8가지나요? 유저 입장에선 그냥 재밌다 하나인데, 굉장히 디테일한데,"}, {"start": 734.7, "end": 736.98, "text": "구체적으로 어떤 경험의 차이가 있나요?"}, {"start": 736.98, "end": 742.62, "text": "예를 들어 젤다의 전설 같은 경우는 발견을 통해 미개척지를 탐험하는 즐거움을 주거나"}, {"start": 742.62, "end": 747.66, "text": "와우처럼 사교를 통해 유저 간 끈끈한 연대감을 주는 등 기획 의도에 따라"}, {"start": 747.66, "end": 749.74, "text": "타겟하는 감성이 완전히 다릅니다."}, {"start": 749.74, "end": 755.5, "text": "아, 타겟 감정이 아예 다르구나. 그럼 그런 세밀한 미학적 감정을 끌어내기 위해"}, {"start": 755.5, "end": 760.78, "text": "플레이어에 실제 행동과 상호작용인 역학은 구체적으로 어떻게 조작하나요?"}, {"start": 760.78, "end": 763.66, "text": "여기서 역학 및 확률의 개념이 들어갑니다."}, {"start": 763.66, "end": 768.2199999999999, "text": "역학 단계에서 미학 달성을 위해 확률 등을 적극적으로 사용하여"}, {"start": 768.2199999999999, "end": 771.62, "text": "유저의 행동을 통제하고 제어한다고 정의하거든요."}, {"start": 771.62, "end": 774.14, "text": "확률로 유저 행동을 제어한다고요?"}, {"start": 774.14, "end": 779.78, "text": "솔직히 가차 확률 보면 단순히 운에 맡겨서 유저 도파민 터뜨려 놓은 거 아닌가요?"}, {"start": 779.78, "end": 781.18, "text": "상툴 같기도 하고요."}, {"start": 781.18, "end": 785.26, "text": "유저 입장에선 얄밉겠지만 기획 의도가 다릅니다."}, {"start": 785.26, "end": 792.3399999999999, "text": "가차 시스템에서 S급 아이템을 단 1% 확률로 제한하는 건 단순한 사행성이 아니에요."}, {"start": 792.34, "end": 797.3000000000001, "text": "유저의 플레이 타임과 컨텐츠 소모 속도를 기획 의도대로 늦추는"}, {"start": 797.3000000000001, "end": 799.82, "text": "고도의 역학적 장치입니다."}, {"start": 799.82, "end": 803.98, "text": "와 1% 확률이 제속도 조절 브레이크 였군요."}, {"start": 803.98, "end": 805.6600000000001, "text": "진짜 충격이네요."}, {"start": 805.6600000000001, "end": 808.02, "text": "그럼 확률 말고 유저의 행동을 통제하기 위해"}, {"start": 808.02, "end": 810.7, "text": "게임 내에서 쓰는 또 다른 강력한 무기가 있나요?"}, {"start": 810.7, "end": 811.62, "text": "네."}, {"start": 811.62, "end": 813.94, "text": "게임 내 자원 관리가 있습니다."}, {"start": 813.94, "end": 818.86, "text": "돈, 시간, 경험치 등 게임 내 자원의 획득과 소비를 관리하여"}, {"start": 818.86, "end": 822.9, "text": "유저의 행동 양식을 정확히 예측하고 조절하는 기법이죠."}, {"start": 822.9, "end": 827.78, "text": "가상의 자원을 졌다 뺏는 걸로 제 현실 행동까지 통제할 수 있다고요?"}, {"start": 827.78, "end": 829.1800000000001, "text": "어떻게 그게 가능하죠?"}, {"start": 829.1800000000001, "end": 831.74, "text": "예전에 애니팡 하트 시스템 기억하시나요?"}, {"start": 831.74, "end": 833.22, "text": "아 카톡 엄청 보냈죠."}, {"start": 833.22, "end": 834.34, "text": "맞아요."}, {"start": 834.34, "end": 837.94, "text": "5분에 딱 1개씩 재생되는 하트 자원을 주어서"}, {"start": 837.94, "end": 840.98, "text": "1회 플레이 타임을 강제 제한하는 겁니다."}, {"start": 840.98, "end": 844.22, "text": "그걸로 한 번에 질려버리는 권태감을 줄이고"}, {"start": 844.22, "end": 849.6600000000001, "text": "재접속 빈도를 늘려 게임 수명을 엄청나게 연장한 놀라운 사례죠."}, {"start": 849.6600000000001, "end": 854.62, "text": "하트 대기 시간 5분이 다 치밀하게 계산된 수명 연장책이었네요."}, {"start": 854.62, "end": 857.22, "text": "그렇다면 유저가 이렇게 플레이 하다가"}, {"start": 857.22, "end": 860.58, "text": "경쟁 게임에서 한쪽이 너무 유리해지거나 불리해지는 상황은"}, {"start": 860.58, "end": 862.46, "text": "시스템이 스스로 어떻게 바로 잡나요?"}, {"start": 862.46, "end": 865.46, "text": "마지막으로 피드백 시스템이 개입합니다."}, {"start": 865.46, "end": 869.26, "text": "상황에 따라 시스템을 안정화하는 부정적 피드백과"}, {"start": 869.26, "end": 872.46, "text": "불안정하게 가속하는 긍정적 피드백을 통해"}, {"start": 872.46, "end": 875.0600000000001, "text": "밸런스를 스스로 조절하는 시스템입니다."}, {"start": 875.0600000000001, "end": 876.9000000000001, "text": "안정과 불안정이요?"}, {"start": 876.9000000000001, "end": 880.58, "text": "보통 긍정적인 게 좋은 거고 부정적인 게 나쁜 거 아닌가요?"}, {"start": 880.58, "end": 882.38, "text": "게임에선 이게 대체 무슨 의미죠?"}, {"start": 882.38, "end": 884.0600000000001, "text": "롤을 예로 들어보죠."}, {"start": 884.0600000000001, "end": 887.62, "text": "타월을 펠리 철거해 승리 쪽으로 스노우볼을 굴리는 건"}, {"start": 887.62, "end": 890.98, "text": "시스템을 불안정하게 하는 긍정적 피드백입니다."}, {"start": 890.98, "end": 893.26, "text": "아 격차를 벌리는 거군요."}, {"start": 893.26, "end": 898.4200000000001, "text": "네 반대로 미니언을 많이 처치할수록 라인이 적 쪽으로 깊게 밀려서"}, {"start": 898.4200000000001, "end": 901.02, "text": "오히려 적에게 역전 기회를 주는 것은"}, {"start": 901.02, "end": 905.22, "text": "격차를 줄여 시스템을 안정화하는 부정적 피드백입니다."}, {"start": 905.22, "end": 908.22, "text": "이걸 명확히 구분해서 밸런스를 잡죠."}, {"start": 908.22, "end": 911.5, "text": "아하 잘 나갈 때 밟는 가속 페달과"}, {"start": 911.5, "end": 916.3, "text": "앞서가면 뒤통수 치는 브레이크가 시스템을 팽팽하게 유지하는 거군요."}, {"start": 916.3, "end": 920.38, "text": "청취자 여러분 오늘 우리는 화려한 그래픽과 타격감 이면에"}, {"start": 920.38, "end": 924.98, "text": "엑셀 테이블로 얽힌 규칙, 유저 심리를 쥐락펴락하는 확률,"}, {"start": 924.98, "end": 928.46, "text": "자원 관리에 정교한 수학적 톱니바퀴가 돌아가고 있음을"}, {"start": 928.46, "end": 930.06, "text": "낱낱이 파헤쳐봤습니다."}, {"start": 930.06, "end": 932.6999999999999, "text": "네 정말 치밀한 설계도면이었죠."}, {"start": 932.6999999999999, "end": 937.18, "text": "청취자님 다음 번에 가차에서 1% 확률에 좌절하거나"}, {"start": 937.18, "end": 940.18, "text": "게임 하트가 충전되기를 5분 동안 기다릴 때"}, {"start": 940.18, "end": 945.3399999999999, "text": "당신은 짜증내는 대신 기획자의 의도대로 완벽하게 통제되고 있다는 사실에"}, {"start": 945.3399999999999, "end": 947.0999999999999, "text": "아마 미소짓게 되실 겁니다."}, {"start": 947.0999999999999, "end": 948.7399999999999, "text": "아하 맞습니다."}, {"start": 948.7399999999999, "end": 950.78, "text": "전부 다 기획자의 손바닥이니까요."}, {"start": 950.78, "end": 953.7399999999999, "text": "생각해보면 신용점수를 올려 노력하고"}, {"start": 953.7399999999999, "end": 957.5799999999999, "text": "SNS에서 좋아요라는 보상을 얻으려 게이심으로 올리고"}, {"start": 957.58, "end": 961.38, "text": "카페에서 쿠폰 도장을 모으는 우리의 이런 일상 규칙들 역시"}, {"start": 961.38, "end": 965.74, "text": "보이지 않는 기획자들이 치밀하게 설계한 거대한 현실판 역학과"}, {"start": 965.74, "end": 967.46, "text": "시스템 구조가 아닐까요?"}, {"start": 967.46, "end": 969.82, "text": "오늘의 딥다이브는 여기서 마칩니다."}, {"start": 969.82, "end": 973.22, "text": "다음 시간에도 흥미로운 지식의 이면으로 여러분을 안내하겠습니다."}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const ICON_PLAY  = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg>';
const ICON_PAUSE = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/></svg>';
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();
// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        list.appendChild(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    const items = document.querySelectorAll('#index-overlay-list .index-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

buildOverlayIndex();

</script>
